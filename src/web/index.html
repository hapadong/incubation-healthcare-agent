<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HealthAgent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #252836;
      --border: #2e3147;
      --accent: #4f8ef7;
      --accent-dim: #1e3a6e;
      --text: #e2e6f0;
      --text-dim: #8b92a8;
      --user-bubble: #1e3a6e;
      --danger: #e05252;
      --success: #4caf7d;
      --tool-bg: #161922;
      --radius: 10px;
      --sidebar-w: 260px;
    }

    html, body, #root { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    body { background: var(--bg); color: var(--text); overflow: hidden; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* markdown in assistant messages */
    .md-content p { margin-bottom: 0.6em; }
    .md-content p:last-child { margin-bottom: 0; }
    .md-content ul, .md-content ol { padding-left: 1.4em; margin-bottom: 0.6em; }
    .md-content li { margin-bottom: 0.2em; }
    .md-content h1, .md-content h2, .md-content h3 {
      margin: 0.8em 0 0.4em; font-weight: 600;
    }
    .md-content code {
      background: var(--tool-bg); border: 1px solid var(--border);
      border-radius: 4px; padding: 0.1em 0.35em;
      font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 0.85em;
    }
    .md-content pre {
      background: var(--tool-bg); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1em; overflow-x: auto; margin-bottom: 0.6em;
    }
    .md-content pre code { background: none; border: none; padding: 0; }
    .md-content blockquote {
      border-left: 3px solid var(--accent); padding-left: 0.8em;
      color: var(--text-dim); margin-bottom: 0.6em;
    }
    .md-content table { border-collapse: collapse; width: 100%; margin-bottom: 0.6em; font-size: 0.9em; }
    .md-content th, .md-content td {
      border: 1px solid var(--border); padding: 0.4em 0.7em; text-align: left;
    }
    .md-content th { background: var(--surface2); }
    .md-content a { color: var(--accent); text-decoration: none; }
    .md-content a:hover { text-decoration: underline; }
    .md-content strong { font-weight: 600; }
    .md-content em { font-style: italic; }
    .md-content hr { border: none; border-top: 1px solid var(--border); margin: 0.8em 0; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/app.js"></script>
</body>
</html>
